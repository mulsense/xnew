<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xnew multi-client (4 frames)</title>
  <style>
    /* 左右上下に 4 分割。各セルで index.html を 1 クライアントとして表示する（動作確認用）。 */
    html, body { margin: 0; height: 100%; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      width: 100vw;
      height: 100vh;
      background: #cbd5e1;   /* セル間の境界線に見える背景 */
    }
    .grid iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="grid">
    <iframe src="./index.html" title="client 1"></iframe>
    <iframe src="./index.html" title="client 2"></iframe>
    <iframe src="./index.html" title="client 3"></iframe>
    <iframe src="./index.html" title="client 4"></iframe>
  </div>
</body>
</html>
