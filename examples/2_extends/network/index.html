<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xnew multi-client (socket.io)</title>
  <script src="/thirdparty/tailwindcss/playcdn.js"></script>
  <!-- xnew はサーバーが /xnew で配信するローカルビルドを使う（game.js は @mulsense/xnew を import） -->
  <script type="importmap">
    { "imports": {
        "@mulsense/xnew": "/xnew/xnew.mjs",
        "@mulsense/xnew/addons/xsocket": "/xnew/addons/xsocket.mjs"
    } }
  </script>
</head>
<body class="m-2 font-sans text-gray-600">
  <!-- 接続状態 / ルーム情報の表示先（シーンから App.setStatus で更新される） -->
  <p class="text-[13px] leading-relaxed mb-3"><span id="status" class="text-red-500">接続中…</span></p>
  <!-- ロビー / ゲームの両シーンがここに mount される -->
  <div id="app"></div>
  <!-- socket.io クライアント（socket.io サーバーが自動配信。グローバル io を定義する） -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="./index.js"></script>
</body>
</html>
