<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="importmap">
    {
      "imports": {
        "@mulsense/xnew": "../../dist/xnew.mjs"
      }
    }
  </script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>
  <script type="module">
    import { xnew } from '@mulsense/xnew';

    xnew(document.querySelector('#main'), Main);

    function Main(unit) {
      xnew.nest('<div class="m-2">');
      xnew('<p class="mb-2 text-sm text-stone-600">', 'click a button to play a game sound effect');

      // name -> generator. Each generator builds a Synthesizer on the fly and presses notes;
      // multi-note effects offset the start with the 3rd `press` argument (wait, ms).
      const effects = {
        coin: playCoin,
        jump: playJump,
        powerup: playPowerup,
        explosion: playExplosion,
        hit: playHit,
        select: playSelect,
        confirm: playConfirm,
        gameover: playGameover,
      };

      xnew('<div class="flex flex-wrap gap-2 max-w-[520px]">', () => {
        Object.entries(effects).forEach(([name, play]) => {
          xnew(Button, { name }).on('click', () => play());
        });
      });

      xnew('<div class="absolute right-[2cqw] bottom-[2cqw] size-[8cqw] text-stone-500">',
        xnew.basics.VolumeController, { anchor: 'left' });
    }

    function Button(unit, { name }) {
      xnew.nest('<button class="h-8 px-3 border rounded-lg cursor-pointer bg-blue-200 hover:opacity-50">');
      unit.element.textContent = name;
    }

    // Coin pickup: a short low blip snapping up to a sustained bright note (classic platformer coin).
    function playCoin() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square' },
        amp: { envelope: { amount: 0.3, ADSR: [1, 80, 0.7, 120] } },
      });
      synth.press('B5', 90);
      synth.press('E6', 200, 90);
    }

    // Jump: a fast upward pitch sweep (+24 semitones) that fades out via the amp decay rather than
    // the release tail, so the pitch reset at note-end stays silent (no trailing "ton").
    function playJump() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square', envelope: { amount: 24, ADSR: [80, 0, 1, 1] } },
        amp: { envelope: { amount: 0.3, ADSR: [1, 160, 0, 1] } },
      });
      synth.press('A4', 160);
    }

    // Power-up: an ascending arpeggio (C5-E5-G5-C6) staggered by the wait argument.
    function playPowerup() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'triangle' },
        amp: { envelope: { amount: 0.3, ADSR: [1, 60, 0.3, 80] } },
      });
      ['C5', 'E5', 'G5', 'C6'].forEach((note, i) => synth.press(note, 120, i * 70));
    }

    // Explosion: low square pitched downward (-24 semitones) through a lowpass filter, long decay.
    function playExplosion() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square', envelope: { amount: -24, ADSR: [10, 600, 0, 1] } },
        filter: { type: 'lowpass', cutoff: 800 },
        amp: { envelope: { amount: 0.4, ADSR: [1, 400, 0, 300] } },
      });
      synth.press('A2', 600);
    }

    // Hit / damage: a short harsh low buzz with a quick downward sweep.
    function playHit() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square', envelope: { amount: -12, ADSR: [1, 100, 0, 1] } },
        amp: { envelope: { amount: 0.35, ADSR: [1, 0, 1, 100] } },
      });
      synth.press('A3', 120);
    }

    // Select / cursor move: a very short high blip.
    function playSelect() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square' },
        amp: { envelope: { amount: 0.25, ADSR: [1, 0, 1, 30] } },
      });
      synth.press('C6', 40);
    }

    // Confirm / decide: two short rising blips (C5 -> G5).
    function playConfirm() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'square' },
        amp: { envelope: { amount: 0.3, ADSR: [1, 40, 0.4, 60] } },
      });
      synth.press('C5', 80);
      synth.press('G5', 220, 80);
    }

    // Game over: a slow descending triangle melody (C5-B4-A4-G4).
    function playGameover() {
      const synth = xnew.audio.synthesizer({
        oscillator: { type: 'triangle' },
        amp: { envelope: { amount: 0.3, ADSR: [2, 200, 0.4, 200] } },
      });
      ['C5', 'B4', 'A4', 'G4'].forEach((note, i) => synth.press(note, i === 3 ? 600 : 280, i * 280));
    }

  </script>
</body>
</html>
