<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../dist/xnew.js"></script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen">
  <div id="main" class="relative w-full h-full flex flex-col overflow-hidden"></div>

  <script>
    xnew(document.querySelector('#main'), Main);

    function Main(unit) {
      xnew.nest('<div class="h-full flex flex-col">');
      xnew(FlowDiagram);
      xnew(Console);
      xnew(PromiseTest);
    }

    function Console(unit) {
      xnew.nest('<div class="flex-none w-full h-24 p-2 text-sm bg-gray-100">');

      return {
        print(text) {
          xnew('<p>', text);
        }
      }
    }

    function PromiseTest(unit) {
      const assets = xnew(Assets);

      xnew.promise(assets).then((results) => {
        xnew.context(Console).print(`Results: ${JSON.stringify(results)}`);
      });
    }

    function Assets(unit) {
      xnew.promise((resolve) => {
        xnew.timeout(() => resolve('Asset 1 loaded.'), 2000);
      }).then((text) => {
        xnew.context(Console).print(text);
        xnew.output({ data1: 1 });
      });

      xnew.promise((resolve) => {
        xnew.timeout(() => resolve('Asset 2 loaded.'), 1000);
      }).then((text) => {
        xnew.context(Console).print(text);
        xnew.output({ data2: 2 });
      });

      xnew.then((results) => {
        xnew.context(Console).print('Assets Component Resolved.');
      });
    }

    function FlowDiagram(unit) {
      xnew.nest('<div class="flex-auto w-full">');
      xnew.nest('<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; container-type: size;">');
      xnew.nest(`<div style="position: relative; width: min(100cqw, calc(100cqh * ${420/380})); aspect-ratio: ${420/380};">`);

      xnew.nest('<svg viewBox="0 0 420 380" font-family="monospace" class="size-full">');

      xnew('<defs>', () => {
        xnew('<marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">', () => {
          xnew('<path d="M0,0 L0,6 L8,3 z" fill="#64748b">');
        });
      });

      function Container(unit, { x, y, w, h, fill, stroke, sw = 2, label, color, size = 13 }) {
        xnew(`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="${sw}">`);
        xnew(`<text x="${x + 14}" y="${y + size + 5}" fill="${color}" font-weight="bold" font-size="${size}">`, label);
      }

      function Node(unit, { x, y, w, h, fill, stroke, label, color, sub }) {
        const cx = x + w / 2;
        xnew(`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="${fill}" stroke="${stroke}" stroke-width="1.5">`);
        xnew(`<text x="${cx}" y="${Math.round(y + h * (sub ? 0.42 : 0.55))}" text-anchor="middle" fill="${color}" font-weight="bold" font-size="12">`, label);
        xnew(`<text x="${cx}" y="${Math.round(y + h * 0.77)}" text-anchor="middle" fill="${color}" font-size="11">`, sub);
      }

      function Line(unit, { x1, y1, x2, y2, arrow = false }) {
        xnew(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#64748b" stroke-width="1.5"${arrow ? ' marker-end="url(#arr)"' : ''}>`);
      }

      xnew(Container, { x: 10, y: 10, w: 400, h: 360, fill: '#eff6ff', stroke: '#3b82f6', label: 'PromiseTest', color: '#1e40af', size: 15 });
      xnew(Container, { x: 30, y: 52, w: 360, h: 218, fill: '#f0fdf4', stroke: '#22c55e', label: 'Assets', color: '#15803d' });

      xnew(Node, { x:  50, y: 80, w: 140, h: 60, fill: '#fefce8', stroke: '#ca8a04', label: 'Promise 1', color: '#854d0e', sub: 'timeout: 2000ms' });
      xnew(Node, { x: 230, y: 80, w: 140, h: 60, fill: '#fefce8', stroke: '#ca8a04', label: 'Promise 2', color: '#854d0e', sub: 'timeout: 1000ms' });

      xnew(Line, { x1: 120, y1: 140, x2: 120, y2: 155 });
      xnew(Line, { x1: 300, y1: 140, x2: 300, y2: 155 });
      xnew(Line, { x1: 120, y1: 155, x2: 300, y2: 155 });
      xnew(Line, { x1: 210, y1: 155, x2: 210, y2: 175 });
      xnew(Line, { x1: 120, y1: 175, x2: 300, y2: 175 });
      xnew(Line, { x1: 300, y1: 175, x2: 300, y2: 195, arrow: true });
      xnew(Line, { x1: 120, y1: 175, x2: 120, y2: 286, arrow: true });

      xnew(Node, { x: 230, y: 195, w: 140, h: 60, fill: '#f1f5f9', stroke: '#94a3b8', label: 'xnew.then()', color: '#334155', sub: '' });
      xnew(Node, { x: 50, y: 286, w: 140, h: 60, fill: '#ede9fe', stroke: '#7c3aed', label: 'xnew.promise(assets)', color: '#4c1d95', sub: '.then() → show results' });
    }

  </script>
</body>

</html>
