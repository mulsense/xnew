<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../dist/xnew.js"></script>
  <script src="../../thirdparty/html2canvas-pro/html2canvas-pro.min.js"></script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>

  <script>
    xnew(document.querySelector('#main'), Main);

    function Main(unit) {
      xnew.extend(xnew.basics.Screen, { width: 480, height: 320 });

      xnew(Content);
      xnew(ScreenshotButton);
    }

    function Content(unit) {
      xnew.nest('<div class="absolute inset-0 flex flex-col items-center justify-center gap-6 bg-gradient-to-br from-sky-100 to-indigo-100">');
      xnew('<h1 class="text-2xl font-bold text-gray-700">', 'Screenshot Sample');

      xnew('<div class="flex gap-4">', () => {
        ['bg-red-400', 'bg-yellow-400', 'bg-green-400', 'bg-blue-400', 'bg-purple-400'].forEach((color, i) => {
          const box = xnew(`<div class="w-14 h-14 ${color} rounded-xl shadow-md">`);
          let t = i * 1.2;
          unit.on('update', () => {
            box.element.style.transform = `translateY(${Math.sin(t) * 8}px)`;
            t += 0.05;
          });
        });
      });

      let count = 0;
      const timer = xnew('<p class="text-gray-400 text-sm font-mono">');
      unit.on('update', () => {
        timer.element.textContent = `frame: ${count++}`;
      });
    }

    function ScreenshotButton(unit) {
      xnew.nest('<div class="absolute bottom-4 left-0 right-0 flex justify-center">');
      const button = xnew('<button class="px-6 py-2 bg-indigo-500 text-white font-bold rounded-lg shadow hover:bg-indigo-600 cursor-pointer">', 'Save Screenshot');
      button.on('click', () => xnew(ScreenShot));
    }

    function ScreenShot(unit) {
      xnew.nest(xnew.context(Main).element);
      const cover = xnew('<div class="absolute inset-0 size-full z-10 bg-white">');
      xnew.transition(({ value }) => cover.element.style.opacity = 1 - value, 600)
      .timeout(() => {
        html2canvas(unit.element, { scale: 2, logging: false, useCORS: true }).then((canvas) => {
          xnew.image.from(canvas).download('screenshot.png');
        });
        unit.finalize();
      });
    }
  </script>
</body>

</html>
