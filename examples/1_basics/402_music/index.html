<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="importmap">
    {
      "imports": {
        "@mulsense/xnew": "../../dist/xnew.mjs"
      }
    }
  </script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>
  <script type="module">
    import { xnew } from '@mulsense/xnew';

    xnew(document.querySelector('#main'), Main);
    
    function Main(unit) {
      xnew.nest('<div class="m-2 flex gap-2">');
      // load() returns a promise that resolves with the AudioTrack once decoded; chaining .then on
      // each click keeps it load-aware — clicking before the buffer finishes loading just defers.
      // play resumes from the last pause position (or 0 on first call); stop halts playback and
      // resets the position to 0, so the next play starts from the beginning.
      const music = xnew.audio.load('b096.mp3');
      xnew(Button, { name: 'play' }).on('click', () => {
        music.then((track) => track.play({ fade: 1000 }));
      });
      xnew(Button, { name: 'pause' }).on('click', () => {
        music.then((track) => track.pause({ fade: 1000 }));
      });
      xnew(Button, { name: 'stop' }).on('click', () => {
        music.then((track) => track.stop({ fade: 1000 }));
      });
      xnew('<div class="absolute right-[2cqw] bottom-[2cqw] size-[8cqw] text-stone-500">', 
        xnew.basics.VolumeController, { anchor: 'left' });
    }

    function Button(unit, { name }) {
      xnew.nest('<button class="h-8 px-2 border rounded-lg cursor-pointer bg-blue-200 hover:opacity-50">');
      unit.element.textContent = name;
    }

    
  </script>
</body>
</html>
