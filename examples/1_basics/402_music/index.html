<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="importmap">
    {
      "imports": {
        "@mulsense/xnew": "../../dist/xnew.mjs"
      }
    }
  </script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>
  <script type="module">
    import { xnew } from '@mulsense/xnew';

    xnew(document.querySelector('#main'), Main);
    
    function Main(unit) {
      xnew.nest('<div class="m-2 flex gap-2">');
      // The AudioTrack component fetches + decodes the file and is load-aware: calling play() before
      // the buffer finishes loading just defers playback. play() resumes from the last pause position
      // (or 0 on first call); play({ offset: 0 }) restarts from the beginning. The track is released
      // when this unit finalizes.
      const music = xnew(xnew.basics.AudioTrack, { url: 'b096.mp3' });
      xnew(Button, { name: 'play' }).on('click', () => {
        music.play({ fade: 1000 });
      });
      xnew(Button, { name: 'pause' }).on('click', () => {
        music.pause({ fade: 1000 });
      });
      xnew(Button, { name: 'restart' }).on('click', () => {
        music.play({ offset: 0, fade: 1000 });
      });
      // A minimal volume slider: extend xnew.basics.Volume for master-gain access, then bind a plain
      // <input type="range"> to it.
      xnew('<div class="absolute right-2 bottom-2 flex items-center gap-2 text-stone-500">', (unit) => {
        const volume = xnew.extend(xnew.basics.Volume);
        xnew('<span class="text-sm">', 'volume');
        const input = xnew('<input type="range" min="0" max="100" class="cursor-pointer">');
        input.element.value = volume.volume * 100;
        input.on('input', ({ event }) => volume.volume = event.target.value / 100);
      });
    }

    function Button(unit, { name }) {
      xnew.nest('<button class="h-8 px-2 border rounded-lg cursor-pointer bg-blue-200 hover:opacity-50">');
      unit.element.textContent = name;
    }

    
  </script>
</body>
</html>
