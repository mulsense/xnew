<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../dist/xnew.js"></script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>
  <script>
    xnew(document.querySelector('#main'), Main);
    
    function Main(unit) {
      xnew.nest('<div class="m-2 flex gap-2">');
      xnew.audio.load('b096.mp3').then((music) => {
        // Play and Stop buttons
        xnew(Button, { name: 'play' }).on('click', () => {
          music.play({ fade: 1000 });
        });
        xnew(Button, { name: 'stop' }).on('click', () => {
          music.pause({ fade: 1000 });
        });
      });
      xnew('<div class="absolute right-[2cqw] bottom-[2cqw] h-[4cqw] text-stone-500">', VolumeController);
    }

    function Button(unit, { name }) {
      xnew.nest('<button class="h-8 px-2 border rounded-lg cursor-pointer bg-blue-200 hover:opacity-50">');
      unit.element.textContent = name;
    }

    function VolumeController(unit, { direction = 'left' } = {}) {
      const isHorizontal = direction === 'left' || direction === 'right';
      const gap = '0.3em';

      // Root is always a 1:1 square; slider is absolute-positioned outside it
      xnew.nest('<div style="position: relative; height: 100%; aspect-ratio: 1;">');
      unit.on('pointerdown', ({ event }) => event.stopPropagation());

      let isOpen = false;
      const colorA = 'color-mix(in srgb, currentColor 60%, transparent)';
      const colorB = 'color-mix(in srgb, currentColor 15%, transparent)';

      // Button fills the square
      const button = xnew(() => {
        xnew.nest('<div style="width: 100%; height: 100%; cursor: pointer;">');
        let icon = xnew(xnew.audio.volume > 0 ? SpeakerWave : SpeakerXMark);
        return {
          update() {
            icon?.finalize();
            icon = xnew(xnew.audio.volume > 0 ? SpeakerWave : SpeakerXMark);
          }
        };
      });

      // Slider: absolutely positioned in the given direction
      const transformClose = { left: 'translateY(-50%) scaleX(0)', right: 'translateY(-50%) scaleX(0)', up: 'translateX(-50%) scaleY(0)', down: 'translateX(-50%) scaleY(0)' }[direction];
      const transformOpen  = { left: 'translateY(-50%) scaleX(1)', right: 'translateY(-50%) scaleX(1)', up: 'translateX(-50%) scaleY(1)', down: 'translateX(-50%) scaleY(1)' }[direction];
      const sliderBase = {
        left:  `position: absolute; right: 100%; top: 50%; transform-origin: right center;  margin-right: ${gap}; height: 60%; width: 8em;`,
        right: `position: absolute; left: 100%; top: 50%; transform-origin: left center;   margin-left: ${gap};  height: 60%; width: 8em;`,
        up:    `position: absolute; bottom: 100%; left: 50%; transform-origin: center bottom; margin-bottom: ${gap}; width: 1.5em; height: 8em;`,
        down:  `position: absolute; top: 100%; left: 50%; transform-origin: center top;    margin-top: ${gap};   width: 1.5em; height: 8em;`,
      }[direction];

      const slider = xnew(() => {
        xnew.nest(`<div style="${sliderBase} transform: ${transformClose}; transition: transform 0.25s ease; pointer-events: none; border: 1px solid ${colorA}; border-radius: 0.25em; box-sizing: border-box; cursor: pointer; user-select: none;">`);

        if (isHorizontal) {
          const fill = xnew(`<div style="position: absolute; top: 0; left: 0; bottom: 0; width: ${xnew.audio.volume * 100}%; background: ${colorB}; transition: width 0.05s;">`);
          const input = xnew(`<input type="range" min="0" max="100" value="${xnew.audio.volume * 100}" style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0;">`);
          input.on('input', ({ event }) => {
            const v = Number(event.target.value);
            fill.element.style.width = `${v}%`;
            xnew.audio.volume = v / 100;
          });
        } else {
          const fill = xnew(`<div style="position: absolute; left: 0; right: 0; bottom: 0; height: ${xnew.audio.volume * 100}%; background: ${colorB}; transition: height 0.05s;">`);
          const input = xnew(`<input type="range" min="0" max="100" value="${xnew.audio.volume * 100}" style="position: absolute; width: 8em; height: 1.5em; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg); opacity: 0; cursor: pointer; margin: 0;">`);
          input.on('input', ({ event }) => {
            const v = Number(event.target.value);
            fill.element.style.height = `${v}%`;
            xnew.audio.volume = v / 100;
          });
        }
      });

      function open()  { isOpen = true;  slider.element.style.transform = transformOpen;  slider.element.style.pointerEvents = 'auto'; }
      function close() { isOpen = false; slider.element.style.transform = transformClose; slider.element.style.pointerEvents = 'none'; }

      button.on('click', () => isOpen ? close() : open());
      unit.on('click.outside', close);
      slider.on('input', ({ event }) => {
        xnew.audio.volume = parseFloat(event.target.value) / 100;
        button.update();
      });
    }

    function SVGTemplate(unit){
      xnew.nest(`<svg viewBox="0 0 24 24" fill="none" style="stroke-width: 1.5; stroke: currentColor; stroke-linejoin: 'round'; stroke-linecap: 'round';">`);
    }

    function SpeakerWave(unit){
      xnew.extend(SVGTemplate);
      xnew('<path d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9 9 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25z" />');
    }
    function SpeakerXMark(unit){
      xnew.extend(SVGTemplate);
      xnew('<path d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9 9 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25z" />');
    }
  </script>
</body>
</html>
