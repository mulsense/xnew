<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../dist/xnew.js"></script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body>
  <div id="main" class="relative w-full h-full"></div>

  <script>
    let counter = 0;
    xnew(document.querySelector('#main'), Main);
    
    function Main(unit) {
        xnew(Test);
    }

    function Test(unit) {
      unit.key = counter++;
      console.log('test', xnew.context(Test));
      xnew.extend(TestBase);
      if (counter < 3) {
        xnew(Test);
      }
    }

    function TestBase(unit) {
      console.log('testbase', xnew.context(Test));
    }
  </script>
</body>

</html>
