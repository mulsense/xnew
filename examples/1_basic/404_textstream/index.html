<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../dist/xnew.js"></script>
  <script src="../../thirdparty/tailwindcss/playcdn.js"></script>
</head>

<body class="m-0 p-0 w-full h-screen overflow-hidden">
  <div id="main" class="relative w-full h-full"></div>
  <script>

    const SCRIPTS = [
      { name: '勇者', text: 'ついに辿り着いたぞ、魔王の城！　長かった……。' },
      { name: '魔王', text: 'よくぞ来た、勇者よ。待っておったぞ。お茶でも飲むか？' },
      { name: '勇者', text: 'え、いや、戦いに来たんですけど。' },
      { name: '魔王', text: '遠路はるばるご苦労だった。せめてお茶くらい飲んでいけ。ほら、あんみつもあるぞ。' },
      { name: '勇者', text: 'あんみつ！？　……ま、まあ、少しくらいなら。' },
      { name: '魔王', text: 'うむ。ところで勇者よ、世界を救いに来たのだろう？' },
      { name: '勇者', text: 'そうです！　だから戦って——' },
      { name: '魔王', text: '実は世界はもう平和なんだ。先週、魔物たちと話し合いで解決した。' },
      { name: '勇者', text: '……え？' },
      { name: '魔王', text: 'みんな働きたかっただけだったんだ。今は農業組合を作って野菜を育てている。' },
      { name: '勇者', text: '三日間……歩いてきたのに……。' },
      { name: '魔王', text: 'まあそう言うな。あんみつ、おかわりするか？' },
      { name: '勇者', text: '……ください。' },
    ];

    xnew(document.querySelector('#main'), Main);

    function Main(unit) {
      xnew(DialogBox, { scripts: SCRIPTS });
    }

    function DialogBox(unit, { scripts = [] } = {}) {
      const box = xnew('<div class="absolute bottom-0 left-0 right-0 px-6 pb-6 cursor-pointer select-none">');

      let index = 0;
      let currentScript = null;

      function showScript(i) {
        if (currentScript) {
          currentScript.finalize();
          currentScript = null;
        }
        if (i < scripts.length) {
          const { name, text } = scripts[i];
          currentScript = xnew(box.element, Script, { name, text });
        }
      }

      unit.on('pointerdown', () => {
        if (!currentScript) return;
        if (!currentScript.completed) {
          currentScript.skip();
        } else {
          index++;
          showScript(index);
        }
      });

      showScript(0);
    }
    function Script(unit, { name = '', text = '' } = {}) {
      xnew.nest('<div class="overflow-hidden">');

      xnew('<div class="px-4 pt-2 pb-1 inline-block bg-indigo-900/90 rounded-t-xl text-indigo-200 text-sm font-bold tracking-widest">', name);

      const textArea = xnew('<div class="bg-slate-900/85 backdrop-blur-sm px-5 py-4 text-white text-base leading-relaxed min-h-[4.5rem]">');

      const stream = xnew(TextStream, { text, speed: 40 });

      unit.on('update', () => {
        textArea.element.textContent = stream.current;
        if (stream.completed) {
          unit.off('update');
        }
      });

      return {
        get completed() { return stream.completed; },
        skip() {
          stream.skip();
          textArea.element.textContent = stream.current;
        },
      };
    }

    function TextStream(unit, { text = '', duration = 40 } = {}) {
      let current = '';
      let completed = false;
      let interval = null;

      let index = 0;
   
      interval = xnew.interval(() => {
        index++;
        current = text.substring(0, index);
        if (index >= text.length) {
          completed = true;
          interval.clear();
        }
      }, duration);
      
      return {
        get current() { return current; },
        get completed() { return completed; },
        skip() {
          interval.clear();
          current = text;
          completed = true;
        },
      };
    }
  </script>
</body>

</html>
