<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xnew network sample</title>
  <!-- Tailwind (ブラウザ版・ローカル同梱)。DOM を監視するので動的追加クラスにも CSS が当たる -->
  <script src="/thirdparty/tailwindcss/playcdn.js"></script>
  <!-- xnew はサーバーが /xnew で配信するローカルビルドを使う -->
  <script type="importmap">
    {
      "imports": {
        "@mulsense/xnew": "/xnew/xnew.mjs"
      }
    }
  </script>
</head>

<body class="m-0 min-h-screen flex flex-col bg-slate-900 text-slate-200 font-sans">
  <header class="flex items-center gap-3 py-2.5 px-4 border-b border-slate-800">
    <h1 class="m-0 text-lg font-semibold">
      xnew <span class="text-xs font-normal text-slate-400 border border-slate-700 rounded px-1.5 py-px align-middle">network</span>
    </h1>
    <div id="status" class="ml-auto text-sm text-red-400">接続中…</div>
  </header>

  <main id="app" class="relative flex-1 min-h-0 overflow-hidden"></main>

  <!-- socket.io クライアント (socket.io サーバーが自動配信。グローバル io を定義する) -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/app.js"></script>
</body>

</html>
