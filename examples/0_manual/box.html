<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script type="importmap">
    {
      "imports": {
        "@mulsense/xnew": "../dist/xnew.mjs"
      }
    }
  </script>
</head>

<body>
  <script type="module">
    import { xnew } from '@mulsense/xnew';

    xnew(Component);

    function Component(unit) {
      xnew.nest('<div style="position: absolute; width: 200px; height: 200px; inset: 0; margin: auto; background: #08F">');
      
      const text = xnew('<span>');
     
      let running = false;
      unit.on('click', ({ event }) => {
        running ^= true;
        text.element.textContent = running ? 'start' : 'stop';
      });

      let rotate = 0;
      unit.on('update', () => {
        if (running === false) return;
        rotate++;
        unit.element.style.transform = `rotate(${rotate}deg)`;
      });
    }
  </script>
</body>

</html>
