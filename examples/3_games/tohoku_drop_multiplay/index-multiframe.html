<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>とーほくドロップ 2人対戦（2 frames）</title>
  <style>
    /* 左右 2 分割。各セルで index.html を 1 プレイヤーとして表示する（対戦の動作確認用）。 */
    html, body { margin: 0; height: 100%; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 100vw;
      height: 100vh;
      background: #cbd5e1;
    }
    .grid iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="grid">
    <iframe src="./index.html" title="player 1"></iframe>
    <iframe src="./index.html" title="player 2"></iframe>
  </div>
</body>
</html>
